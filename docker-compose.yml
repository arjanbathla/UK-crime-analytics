services:
  db:
    image: postgres:16
    container_name: crime_db
    environment:
      POSTGRES_USER: crime
      POSTGRES_PASSWORD: crime
      POSTGRES_DB: crime
    ports:
      - "5434:5432"   # unusual host port to avoid clashing with any local Postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crime -d crime"]
      interval: 2s
      timeout: 5s
      retries: 30

volumes:
  pgdata:
